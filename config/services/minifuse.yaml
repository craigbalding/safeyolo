schema_version: 1
name: minifuse
description: "MiniFuse API — read-only data access"

auth:
  type: api_key
  header: X-Auth-Token

risky_routes:
  - group: "Feed management"
    description: "Adding, modifying, or removing RSS feed subscriptions"
    tactics: [impact]
    routes:
      - path: "/v1/feeds"
        methods: [POST]
        description: "Create feed — adds a new subscription"
        irreversible: false
      - path: "/v1/feeds/*"
        methods: [PUT]
        description: "Update feed — change URL, category, or crawl settings"
        irreversible: false
      - path: "/v1/feeds/*"
        methods: [DELETE]
        description: "Delete feed — permanently removes feed and all its entries"
        irreversible: true

capabilities:
  reader:
    description: "Read-only access to feeds, entries, and categories"
    routes:
      - methods: [GET]
        path: "/v1/feeds"
      - methods: [GET]
        path: "/v1/feeds/*"
      - methods: [GET]
        path: "/v1/entries"
      - methods: [GET]
        path: "/v1/categories"

  category_manager:
    description: "Manage feeds in a specific category — list, add, update, remove"
    routes:
      - methods: [GET]
        path: "/v1/categories/*/feeds"
      - methods: [GET]
        path: "/v1/categories/*/entries"
      - methods: [POST]
        path: "/v1/feeds"
      - methods: [GET, PUT, DELETE]
        path: "/v1/feeds/*"

    contract:
      template: minifuse.category_manager.v1

      bindings:
        approved_category_id:
          source: agent
          type: integer
          visible_to_operator: true

      state:
        discovered_feed_ids:
          type: set
          item_type: integer
          max_items: 500

      operations:
        - name: list_feeds
          request:
            method: GET
            path: "/v1/categories/{id}/feeds"
            transport:
              require_no_body: true
              allow_headers: [Accept, User-Agent, X-Test-Context]
              deny_ambiguous_encoding: true
            path_params:
              id:
                equals_var: approved_category_id
            query:
              allow: {}
              deny_unknown: true
          response:
            capture:
              - jsonpath: "$[*].id"
                into: discovered_feed_ids

        - name: list_entries
          request:
            method: GET
            path: "/v1/categories/{id}/entries"
            transport:
              require_no_body: true
              allow_headers: [Accept, User-Agent, X-Test-Context]
              deny_ambiguous_encoding: true
            path_params:
              id:
                equals_var: approved_category_id
            query:
              allow:
                status:
                  type: string
                limit:
                  integer_range: [1, 100]
                offset:
                  integer_range: [0, 10000]
                order:
                  type: string
                direction:
                  type: string
              deny_unknown: true

        - name: create_feed
          request:
            method: POST
            path: "/v1/feeds"
            transport:
              allow_headers: [Accept, User-Agent, Content-Type, X-Test-Context]
              deny_ambiguous_encoding: true
            body:
              allow:
                feed_url:
                  type: string
                category_id:
                  equals_var: approved_category_id
              deny_unknown: true

        - name: get_feed
          requires_enforcement: state_enforcement
          request:
            method: GET
            path: "/v1/feeds/{id}"
            transport:
              require_no_body: true
              allow_headers: [Accept, User-Agent, X-Test-Context]
              deny_ambiguous_encoding: true
            path_params:
              id:
                in_state_set: discovered_feed_ids

        - name: update_feed
          requires_enforcement: state_enforcement
          request:
            method: PUT
            path: "/v1/feeds/{id}"
            transport:
              allow_headers: [Accept, User-Agent, Content-Type, X-Test-Context]
              deny_ambiguous_encoding: true
            path_params:
              id:
                in_state_set: discovered_feed_ids

        - name: delete_feed
          requires_enforcement: state_enforcement
          request:
            method: DELETE
            path: "/v1/feeds/{id}"
            transport:
              require_no_body: true
              allow_headers: [Accept, User-Agent, X-Test-Context]
              deny_ambiguous_encoding: true
            path_params:
              id:
                in_state_set: discovered_feed_ids

      enforcement:
        request_shape: enforced
        transport_hygiene: enforced
        state_capture: declared
        state_enforcement: declared
        response_validators: declared

  writer:
    description: "Full feed management — create, update, delete feeds"
    routes:
      - methods: [GET, POST, PUT, DELETE]
        path: "/v1/feeds"
      - methods: [GET, PUT, DELETE]
        path: "/v1/feeds/*"
      - methods: [GET]
        path: "/v1/entries"
      - methods: [GET]
        path: "/v1/categories"
