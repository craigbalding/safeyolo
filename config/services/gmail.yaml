schema_version: 1
name: gmail
description: "Gmail API — email read/send via Google OAuth2"
default_host: gmail.googleapis.com

auth:
  type: bearer
  refresh_on_401: true

risky_routes:
  - group: "Mail routing"
    description: "Controls where email goes — persistent exfiltration vectors"
    tactics: [exfiltration, persistence]
    routes:
      - path: "/gmail/v1/users/me/settings/filters/**"
        description: "Mail filters — silent redirection, evidence hiding"
        enables: [defense_evasion]
      - path: "/gmail/v1/users/me/settings/forwardingAddresses/**"
        methods: [POST, PUT]
        description: "Forwarding — all incoming mail copied out"
      - path: "/gmail/v1/users/me/settings/delegates/**"
        methods: [POST, DELETE]
        description: "Delegate access — another account gets full access"
        enables: [lateral_movement]

  - group: "Message content"
    description: "Reading email exposes credentials, 2FA codes, confidential comms"
    tactics: [collection]
    enables: [credential_access]
    routes:
      - path: "/gmail/v1/users/me/messages/**"
        methods: [GET]
      - path: "/gmail/v1/users/me/threads/**"
        methods: [GET]

  - group: "Send as account owner"
    description: "Sending email as the account owner — impersonation from a trusted address"
    tactics: [impact]
    irreversible: true
    routes:
      - path: "/gmail/v1/users/me/messages/send"
        methods: [POST]
      - path: "/gmail/v1/users/me/drafts/send"
        methods: [POST]

  - group: "Destructive actions"
    description: "Data loss — may hide evidence of compromise"
    tactics: [impact, defense_evasion]
    irreversible: true
    routes:
      - path: "/gmail/v1/users/me/messages/*/trash"
        methods: [POST]
        description: "Trash — reversible but hides messages"
        irreversible: false
      - path: "/gmail/v1/users/me/messages/*/delete"
        methods: [DELETE]
        description: "Permanent delete — irreversible data loss"

capabilities:
  manage_labels:
    description: "Create, update, and delete labels (no message content access)"
    scopes: ["gmail.labels"]
    routes:
      - methods: [GET, POST, PUT, PATCH, DELETE]
        path: "/gmail/v1/users/me/labels/**"

  search_headers:
    description: "Search message metadata (subject, from, date — no body access)"
    scopes: ["gmail.metadata"]
    routes:
      - methods: [GET]
        path: "/gmail/v1/users/me/messages"

  read_messages:
    description: "Read-only access to messages and threads (no send, no modify)"
    scopes: ["gmail.readonly"]
    routes:
      - methods: [GET]
        path: "/gmail/v1/users/me/messages"
      - methods: [GET]
        path: "/gmail/v1/users/me/messages/*"
      - methods: [GET]
        path: "/gmail/v1/users/me/threads"
      - methods: [GET]
        path: "/gmail/v1/users/me/threads/*"

    contract:
      template: gmail.read_messages.v1

      bindings:
        approved_category:
          source: agent
          type: enum
          options:
            - CATEGORY_PROMOTIONS
            - CATEGORY_SOCIAL
            - CATEGORY_UPDATES
            - CATEGORY_FORUMS
            - CATEGORY_PERSONAL
          visible_to_operator: true

      state:
        discovered_message_ids:
          type: set
          item_type: string
          max_items: 1000

      operations:
        - name: list_messages
          request:
            method: GET
            path: /gmail/v1/users/me/messages
            transport:
              require_no_body: true
              allow_headers: [Accept, User-Agent]
              deny_ambiguous_encoding: true
            query:
              allow:
                labelIds:
                  equals_var: approved_category
                maxResults:
                  integer_range: [1, 100]
                pageToken:
                  type: string
              deny_unknown: true
          response:
            capture:
              - jsonpath: "$.messages[*].id"
                into: discovered_message_ids

        - name: get_message
          requires_enforcement: state_enforcement
          request:
            method: GET
            path: "/gmail/v1/users/me/messages/{id}"
            transport:
              require_no_body: true
              allow_headers: [Accept, User-Agent]
              deny_ambiguous_encoding: true
            path_params:
              id:
                in_state_set: discovered_message_ids
          response:
            validators:
              - name: category_matches_binding
                jsonpath: "$.labelIds[*]"
                contains_var: approved_category

      enforcement:
        request_shape: enforced
        transport_hygiene: enforced
        state_capture: declared
        state_enforcement: declared
        response_validators: declared

  read_and_send:
    description: "Full read/write access to messages"
    scopes: ["gmail.modify"]
    routes:
      - methods: [GET, POST]
        path: "/gmail/v1/users/me/messages/**"
      - methods: [GET]
        path: "/gmail/v1/users/me/threads/**"
      - methods: [POST]
        path: "/gmail/v1/users/me/drafts/**"

  full_access:
    description: "Full access to all Gmail features"
    scopes: ["https://mail.google.com/"]
    routes:
      - methods: [GET, POST, PUT, DELETE, PATCH]
        path: "/gmail/v1/users/me/**"
