[pytest]
# Isolation tests run inside the bbtest VM against a minimal Python
# environment (no pytest-asyncio). The root pyproject.toml's
# `asyncio_mode = "auto"` triggers a PytestConfigWarning in this
# environment. Suppress it — none of the isolation tests are async,
# and installing pytest-asyncio inside the guest rootfs just to
# silence a config warning is not worth the image-size cost.
#
# This file also anchors pytest's config discovery to this directory,
# so the root pyproject.toml isn't consulted from inside the VM.
filterwarnings =
    ignore:Unknown config option. asyncio_mode:pytest.PytestConfigWarning
