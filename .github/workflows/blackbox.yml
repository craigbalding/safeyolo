name: Blackbox Tests

# Blackbox tests validate SafeYolo's security guarantees end-to-end.
#
# Two test suites:
#   - Host pytest: Credential routing, network guard via sinkhole inspection
#   - VM pytest: Network isolation, privilege escalation, key isolation (inside real microVM)
#
# These tests require a macOS host with Virtualization.framework (microVM support).
# They cannot run on GitHub Actions ubuntu runners. Run manually on a Mac or
# via the hostctl bridge for remote execution.
#
# See docs/security-testing-design.md for architecture details.

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  blackbox:
    name: Security Blackbox Tests
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.9.24"

      - name: Set up Python
        run: uv python install 3.13

      # Install via uv sync (reads hash-pinned uv.lock) to satisfy
      # Scorecard PinnedDependenciesID — `pip install -e` was flagged
      # as an unpinned pipCommand (alert #245).
      - name: Install SafeYolo
        run: |
          cd cli && uv sync --frozen --extra dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Build guest artifacts
        run: |
          cd guest && ./build-all.sh

      - name: Run blackbox tests
        run: ./tests/blackbox/run-tests.sh --verbose

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: blackbox-test-logs
          path: |
            ~/.local/state/safeyolo/
          retention-days: 7
